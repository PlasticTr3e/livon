name: nangorlens
services:
  db:
    image: postgis/postgis:18-3.6

    volumes:
      - nangorlens_pg_data:/var/lib/postgresql

    env_file: .env
    
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    
    ports:
      - "5432:5432"

volumes:
  nangorlens_pg_data: