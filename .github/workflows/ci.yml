name: NangorLens CI

on:
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  code-quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12.0'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Prisma Validate
        run: npx prisma validate

      - name: Type Check & Lint
        run: |
          npx tsc --noEmit
          npm run lint